<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <meta name="theme-color" content="#111111" />
  <meta name="robots" content="noindex" />
  <title>Offline — S.S. Engineers Invoice Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <div class="form-section offline-page">
      <h2>App not cached yet</h2>
      <p id="offlineConnectionStatus" class="offline-page__status" role="status" aria-live="polite">
        Checking connection…
      </p>
      <p class="offline-page__message">
        Open the invoice app once while online. After that, the full app works offline —
        forms, preview, print, and PDF save.
      </p>
      <div class="btn-group offline-page__actions">
        <button type="button" class="btn-primary" id="offlineHomeBtn">Open invoice app</button>
        <button type="button" class="btn-secondary" id="offlineRetryBtn">Retry</button>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var statusEl = document.getElementById("offlineConnectionStatus");
      var homeBtn = document.getElementById("offlineHomeBtn");
      var retryBtn = document.getElementById("offlineRetryBtn");
      var indexUrl = new URL("index.html", window.location.href).href;

      function updateStatus() {
        if (!statusEl) {
          return;
        }
        statusEl.textContent = navigator.onLine
          ? "Online — opening app…"
          : "Offline — open the app once online to enable offline use.";
      }

      function tryOpenCachedApp() {
        if (!window.caches) {
          window.location.href = "index.html";
          return;
        }

        caches.match(indexUrl).then(function (hit) {
          if (hit) {
            window.location.href = "index.html";
            return;
          }

          caches.keys().then(function (names) {
            var i = 0;

            function tryCache() {
              if (i >= names.length) {
                window.location.href = "index.html";
                return;
              }

              caches.open(names[i]).then(function (cache) {
                return cache.match(indexUrl);
              }).then(function (match) {
                if (match) {
                  window.location.href = "index.html";
                } else {
                  i += 1;
                  tryCache();
                }
              }).catch(function () {
                i += 1;
                tryCache();
              });
            }

            tryCache();
          });
        });
      }

      function tryReload() {
        if (navigator.onLine) {
          tryOpenCachedApp();
          return;
        }
        window.location.reload();
      }

      if (homeBtn) {
        homeBtn.addEventListener("click", tryOpenCachedApp);
      }

      if (retryBtn) {
        retryBtn.addEventListener("click", tryReload);
      }

      window.addEventListener("online", function () {
        updateStatus();
        setTimeout(tryOpenCachedApp, 400);
      });

      window.addEventListener("offline", updateStatus);
      updateStatus();

      if (navigator.onLine) {
        tryOpenCachedApp();
      }
    })();
  </script>
</body>
</html>
