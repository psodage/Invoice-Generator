<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <meta name="theme-color" content="#111111" />
  <meta name="robots" content="noindex" />
  <title>Offline — S.S. Engineers Invoice Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <div class="form-section offline-page">
      <h2>You're offline</h2>
      <p id="offlineConnectionStatus" class="offline-page__status" role="status" aria-live="polite">
        No network connection detected.
      </p>
      <p class="offline-page__message">
        This page is not in your offline cache yet, or the network request failed.
        If you have opened the app online before, go to the home page — the invoice
        form, preview, and print still work from cache.
      </p>
      <div class="btn-group offline-page__actions">
        <button type="button" class="btn-primary" id="offlineHomeBtn">Open app</button>
        <button type="button" class="btn-secondary" id="offlineRetryBtn">Retry</button>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var statusEl = document.getElementById("offlineConnectionStatus");
      var homeBtn = document.getElementById("offlineHomeBtn");
      var retryBtn = document.getElementById("offlineRetryBtn");

      function updateStatus() {
        if (!statusEl) {
          return;
        }
        statusEl.textContent = navigator.onLine
          ? "Connection restored — redirecting…"
          : "No network connection detected.";
      }

      function goHome() {
        window.location.href = "./index.html";
      }

      function tryReload() {
        if (navigator.onLine) {
          goHome();
          return;
        }
        window.location.reload();
      }

      if (homeBtn) {
        homeBtn.addEventListener("click", goHome);
      }

      if (retryBtn) {
        retryBtn.addEventListener("click", tryReload);
      }

      window.addEventListener("online", function () {
        updateStatus();
        setTimeout(goHome, 600);
      });

      window.addEventListener("offline", updateStatus);
      updateStatus();
    })();
  </script>
</body>
</html>
